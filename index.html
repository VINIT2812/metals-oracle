// ── Generate extended historical data from anchor points ──────
function genHist(anchors, points, noise=0.012){
  // anchors: [{month, price}] where month=0 is oldest
  // Interpolates smoothly between anchors with realistic noise
  const result = [];
  const seed = 42;
  let rng = seed;
  const rand = () => { rng = (rng*1664525+1013904223)&0xFFFFFFFF; return (rng>>>0)/0xFFFFFFFF - 0.5; };
  for(let i=0;i<points;i++){
    const t = i/(points-1);
    // Find surrounding anchors
    let lo = anchors[0], hi = anchors[anchors.length-1];
    for(let j=0;j<anchors.length-1;j++){
      if(t>=anchors[j].t && t<=anchors[j+1].t){ lo=anchors[j]; hi=anchors[j+1]; break; }
    }
    const s = lo.t===hi.t ? 0 : (t-lo.t)/(hi.t-lo.t);
    // Smooth step interpolation
    const smooth = s*s*(3-2*s);
    const base = lo.p + (hi.p-lo.p)*smooth;
    result.push(Math.round(base * (1 + rand()*noise)));
  }
  return result;
}

function applyMetalsDev(data){
  // metals.dev with unit=mt, currency=INR → INR per metric tonne
  // Gold/Platinum: per 10g = value / 100,000
  // Silver/Copper: per kg  = value / 1,000
  const m = data.metals;
  const applied = {};
  const ok = (v, min, max) => typeof v==="number" && v>=min && v<=max;

  if(m?.gold){
    let v = m.gold / 100000;
    // Sanity: Gold per 10g should be 80,000–300,000 INR
    if(!ok(v,80000,300000)){ console.warn("metals.dev Gold /100000 =",v,"— trying /1000"); v=m.gold/1000; }

    else console.warn("metals.dev Gold out of range:", m.gold);

  if(m?.silver){
    let v = m.silver / 1000;
    // Silver per kg should be 80,000–600,000 INR
    if(!ok(v,80000,600000)){ console.warn("metals.dev Silver /1000 =",v,"— trying /100"); v=m.silver/100; }
    if(ok(v,80000,600000)) applied.Silver = v;
    else console.warn("metals.dev Silver out of range:", m.silver);
  }
  if(m?.platinum){
    let v = m.platinum / 100000;
    // Platinum per 10g should be 30,000–200,000 INR

    if(ok(v,30000,200000)) applied.Platinum = v;
    else console.warn("metals.dev Platinum out of range:", m.platinum);
  }
  const cu = m?.copper || m?.lme_copper;
  if(cu){
    let v = cu / 1000;
    // Copper per kg should be 500–5,000 INR
    if(!ok(v,500,5000)){ console.warn("metals.dev Cu /1000 =",v,"— trying /10000"); v=cu/10000; }
    if(ok(v,500,5000)) applied.Copper = v;
    else console.warn("metals.dev Copper out of range:", cu);
  }
  console.log("metals.dev raw gold:", m?.gold, "→ per 10g:", applied.Gold?.toFixed(0));
  console.log("metals.dev parsed:", JSON.stringify(Object.fromEntries(Object.entries(applied).map(([k,v])=>[k,v?.toFixed(0)]))));
  return applied;
}

// ── Cross-validate two price sources ─────────────────────────
function crossValidate(pricesA, pricesB){
  const result = {};
  const THRESHOLD = 0.5; // >0.5% diff = flag as warning
  metalKeys.forEach(k=>{
    const a = pricesA[k], b = pricesB[k];
    if(a && b){
      const diff = Math.abs(a-b)/a*100;
      const ok   = diff < THRESHOLD;
      result[k]  = { a: a.toFixed(2), b: b.toFixed(2), diff: diff.toFixed(3), ok };
      if(!ok) console.warn(`⚠ ${k} cross-check MISMATCH: MetalPriceAPI=₹${a.toFixed(0)} vs metals.dev=₹${b.toFixed(0)} (${diff.toFixed(2)}% diff)`);
      else    console.log(`✅ ${k} cross-check OK: ${diff.toFixed(3)}% diff between sources`);
    }
  });
  crossCheck = result;
}

  const drift = {Gold:0.0006, Silver:0.0009, Copper:0.0012, Platinum:0.0008};
  const hour = new Date().getHours();
  const vol = (hour >= 9 && hour <= 17) ? 1.2 : 0.7;
  metalKeys.forEach(k => {
    const move = (Math.random()*2-1)*drift[k]*vol;
    liveData[k] = METALS[k].yahoo_inr*(1+move);
    dataSource[k] = "Simulated";
  });
  liveStatus = "simulated";
  lastUpdated = new Date();
}

async function tryProxy(url, parseContents){
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), 7000);
  try{
    const res = await fetch(url, {signal: controller.signal});
    clearTimeout(timer);
    if(!res.ok) throw new Error("HTTP "+res.status);
    let data = await res.json();
    if(parseContents && data?.contents) data = JSON.parse(data.contents);
    return data;
  }catch(e){ clearTimeout(timer); throw e; }
}

      if(data?.rates && Object.keys(data.rates).length > 0){
        const prices = {};
        // MetalPriceAPI base=INR: rate × (10/31.1035) for Gold/Platinum per 10g
        // rate × (1000/31.1035) for Silver per kg
        if(data.rates.INRXAU){
          const v = data.rates.INRXAU * (10/31.1035);
          // Sanity: Gold per 10g = 80,000–300,000 INR
          prices.Gold = (v>=80000&&v<=300000) ? v : null;
          if(!prices.Gold) console.warn("MetalPriceAPI Gold out of range:", v, "raw rate:", data.rates.INRXAU);
        }
        if(data.rates.INRXAG){
          const v = data.rates.INRXAG * (1000/31.1035);
          prices.Silver = (v>=80000&&v<=600000) ? v : null;
          if(!prices.Silver) console.warn("MetalPriceAPI Silver out of range:", v);
        }
        if(data.rates.INRXPT){
          const v = data.rates.INRXPT * (10/31.1035);
          prices.Platinum = (v>=30000&&v<=200000) ? v : null;
          if(!prices.Platinum) console.warn("MetalPriceAPI Platinum out of range:", v);
        }
        // Remove nulls
        Object.keys(prices).forEach(k=>{ if(!prices[k]) delete prices[k]; });
        console.log("MetalPriceAPI parsed:", JSON.stringify(Object.fromEntries(Object.entries(prices).map(([k,v])=>[k,v?.toFixed(0)]))));
        if(Object.keys(prices).length > 0) return prices;
      }
    }catch(e){ console.log("MetalPriceAPI proxy "+(i+1)+" failed:", e.message); }
  }
  return null;
}

async function fetchLiveData(){
  liveStatus="loading"; updateLiveIndicator();

  // Track API usage
  try{
    const today=new Date().toISOString().slice(0,7);
    const usage=JSON.parse(localStorage.getItem("api_usage")||"{}");
    if(!usage[today]) usage[today]=0;
    usage[today]++;
    localStorage.setItem("api_usage",JSON.stringify(usage));
    updateApiCounter(usage[today]);
  }catch(e){}

  // ── Fetch both sources in parallel ───────────────────────────
  const [pricesA, pricesB] = await Promise.allSettled([
    fetchMetalPriceAPI(),
    fetchMetalsDev()
  ]).then(r => r.map(p => p.status==="fulfilled" ? p.value : null));

  console.log("Source A (MetalPriceAPI):", pricesA ? "✅ success" : "❌ failed");
  console.log("Source B (metals.dev):   ", pricesB ? "✅ success" : "❌ failed");

  if(pricesA && pricesB){
    // BOTH sources available — cross-validate then merge
    crossValidate(pricesA, pricesB);
    // Use average of both for Gold/Silver/Platinum (more accurate)
    metalKeys.forEach(k=>{
      const a = pricesA[k], b = pricesB[k];
      if(a && b){
        // If diff < 1% use average, else prefer Source A (INR-based)
        const diff = Math.abs(a-b)/a*100;
        liveData[k]   = diff < 1.0 ? (a+b)/2 : a;
        dataSource[k] = diff < 1.0 ? "Avg(MetalPriceAPI+metals.dev)" : "MetalPriceAPI";
      } else if(a){ liveData[k]=a; dataSource[k]="MetalPriceAPI"; }
        else if(b){ liveData[k]=b; dataSource[k]="metals.dev"; }
    });
    // Copper only from metals.dev (MetalPriceAPI blocks it)
    if(pricesB.Copper){ liveData.Copper=pricesB.Copper; dataSource.Copper="metals.dev"; }
    liveStatus="success"; lastUpdated=new Date();

  } else if(pricesA){
    // Only Source A — use it, simulate Copper
    Object.assign(liveData, pricesA);
    metalKeys.filter(k=>pricesA[k]).forEach(k=>dataSource[k]="MetalPriceAPI");
    if(pricesB?.Copper){ liveData.Copper=pricesB.Copper; dataSource.Copper="metals.dev"; }
    else{ liveData.Copper=METALS.Copper.yahoo_inr*(1+(Math.random()*2-1)*0.0008); dataSource.Copper="Simulated(MCX base)"; }
    liveStatus="success"; lastUpdated=new Date();
    console.log("⚠ metals.dev unavailable — using MetalPriceAPI only, Copper simulated");

  } else if(pricesB){
    // Only Source B — use metals.dev for everything
    const prices = pricesB;
    Object.keys(prices).forEach(k=>{ liveData[k]=prices[k]; dataSource[k]="metals.dev(fallback)"; });
    liveStatus="success"; lastUpdated=new Date();
    console.log("⚠ MetalPriceAPI unavailable — using metals.dev as fallback for all metals");

  } else {
    // Both failed — simulate
    smartSimulate();
    metalKeys.forEach(k=>dataSource[k]="Simulated");
    console.log("❌ Both APIs failed — using smart simulation");
  }

  saveTodayPrices();
  renderApp();
  updateLiveIndicator(); // ← must be AFTER renderApp so it overwrites the loading spinner
  if(activeTab==="Chart")     setTimeout(renderChart,80);
  if(activeTab==="Portfolio") setTimeout(renderPfChart,80);
}

function updateLiveIndicator(){
  const el = document.getElementById("live-status");
  if(!el) return;
  if(liveStatus === "loading"){
    el.innerHTML = `<div class="loading-spinner"></div><span style="font-size:9px;color:#CCC;margin-left:6px">FETCHING...</span>`;
  } else if(liveStatus === "success"){
    el.innerHTML = `<div class="pulse" style="width:6px;height:6px;border-radius:50%;background:#4CAF50"></div><span style="font-size:9px;color:#4CAF50;letter-spacing:0.18em;margin-left:5px">LIVE</span>`;

    el.innerHTML = `<div class="pulse" style="width:6px;height:6px;border-radius:50%;background:#F4C542"></div><span style="font-size:9px;color:#F4C542;letter-spacing:0.18em;margin-left:5px">SIMULATED</span>`;

}

function manualRefresh(){
  // Reset simulation flag so fresh numbers are generated on manual refresh
  if(liveStatus === "simulated"){
    liveData = {};
  }
  fetchLiveData();
}

function updateApiCounter(count){
  const el = document.getElementById("api-counter");
  if(!el) return;
  const remaining = 100 - (count||0);
  const color = remaining > 50 ? "#4CAF50" : remaining > 20 ? "#F4C542" : "#FF6666";
  el.innerHTML = `<span style="font-size:9px;color:${color};margin-left:8px;border:1px solid ${color}44;padding:1px 6px;border-radius:3px">${remaining} req left</span>`;
}

function updateClock(){

function setRange(r){
  selectedRange = r;
  const tabEl = document.getElementById("tab-content");
  if(tabEl){ tabEl.innerHTML = buildChart(); }
  setTimeout(()=>{ renderChart(); }, 50);
}

function buildConfidenceBands(future, vol90Scale, vol50Scale){
  return future.map((p,i)=>{
    const spread = i/future.length;
    return {
      cu90: p*(1+vol90Scale*spread), cl90: p*(1-vol90Scale*spread),
      cu50: p*(1+vol50Scale*spread), cl50: p*(1-vol50Scale*spread)
    };
  });
}

function getRangeData(metal){
  const m = METALS[metal];
  const ext = HIST_EXTENDED[metal];
  const today = new Date("2026-03-13");

  let histPrices, histLabels, includeForecast=true;

  if(selectedRange==="1D"){
    // Last 2 days of hist + intraday interpolation (20 points)
    const base = m.hist.slice(-2);
    histPrices = [];
    histLabels = [];
    for(let i=0;i<20;i++){
      const t = i/19;
      histPrices.push(Math.round(base[0]+(base[1]-base[0])*t));
      histLabels.push(i===0?"Yesterday":i===19?"Today":i===10?"Noon":"");
    }
    includeForecast = false;

  } else if(selectedRange==="7D"){
    histPrices = m.hist.slice(-7);
    histLabels = histPrices.map((_,i)=>{
      const d=new Date(today); d.setDate(today.getDate()-6+i);
      return d.toLocaleDateString("en-IN",{weekday:"short",day:"numeric"});
    });

  } else if(selectedRange==="1M"){
    histPrices = m.hist.slice(-30);
    histLabels = histPrices.map((_,i)=>{
      const d=new Date(today); d.setDate(today.getDate()-29+i);
      return d.toLocaleDateString("en-IN",{month:"short",day:"numeric"});
    });

  } else if(selectedRange==="3M"){
    histPrices = m.hist;
    histLabels = histPrices.map((_,i)=>{
      const d=new Date(today); d.setDate(today.getDate()-histPrices.length+1+i);
      return d.toLocaleDateString("en-IN",{month:"short",day:"numeric"});
    });

  } else if(selectedRange==="1Y"){
    histPrices = ext.y1;
    histLabels = histPrices.map((_,i)=>{
      const d=new Date(today); d.setDate(today.getDate()-52*7+i*7);
      return d.toLocaleDateString("en-IN",{month:"short",year:"2-digit"});
    });

  } else { // 10Y
    histPrices = ext.y10;
    histLabels = histPrices.map((_,i)=>{
      const d=new Date(today); d.setMonth(today.getMonth()-120+i);
      return d.toLocaleDateString("en-IN",{month:"short",year:"2-digit"});
    });
  }

  return {histPrices, histLabels, includeForecast};
}

function renderChart(){

  const labels=[...histLabels], hD=[...histPrices];

  const cu50=hD.map(()=>null), cl50=hD.map(()=>null), liveP=hD.map(()=>null);

  // Bridge + forecast — use live price as the "NOW" anchor if available
  if(includeForecast){
    const currentPrice = liveData[selectedMetal] || m.yahoo_inr;
    labels.push("NOW");
    hD.push(currentPrice); fD.push(currentPrice);
    cu90.push(null); cl90.push(null); cu50.push(null); cl50.push(null);

      liveP.push(null);
    }

  // Update range stats
  const firstP = histPrices[0], lastP = histPrices[histPrices.length-1];
  const chg = ((lastP-firstP)/firstP*100);
  const statsEl = document.getElementById("range-stats");
  if(statsEl) statsEl.innerHTML =
    `Open: <span style="color:#CCC">${fmtINR(firstP)}</span> &nbsp;
     Close: <span style="color:#CCC">${fmtINR(lastP)}</span> &nbsp;
     Change: <span style="color:${chgColor(chg)}">${chgArrow(chg)} ${Math.abs(chg).toFixed(2)}%</span>`;

  if(chartInstance){chartInstance.destroy();chartInstance=null;}

  // ── CROSSHAIR PLUGIN ──────────────────────────────────────
  const crosshairPlugin = {
    id:"crosshair",
    afterDraw(chart){
      if(chart._crosshairX===undefined) return;
      const {ctx:c, chartArea:{top,bottom,left,right}} = chart;
      const x = chart._crosshairX;
      c.save();
      c.beginPath();
      c.moveTo(x, top); c.lineTo(x, bottom);
      c.strokeStyle = "#FFFFFF33";
      c.lineWidth = 1;
      c.setLineDash([4,4]);
      c.stroke();
      c.setLineDash([]);
      // Horizontal line at active data value
      if(chart._crosshairY!==undefined){
        c.beginPath();
        c.moveTo(left,chart._crosshairY); c.lineTo(right,chart._crosshairY);
        c.strokeStyle="#FFFFFF18";
        c.lineWidth=1;
        c.stroke();
      }
      c.restore();
    }
  };

  chartInstance=new Chart(ctx,{
    type:"line",
    plugins:[crosshairPlugin],
    data:{labels,datasets:[
      {label:"90U",data:cu90,borderColor:"transparent",backgroundColor:m.color+"20",fill:"+1",pointRadius:0,spanGaps:false,tension:0.4},
      {label:"90L",data:cl90,borderColor:"transparent",backgroundColor:m.color+"20",fill:false,pointRadius:0,spanGaps:false,tension:0.4},
      {label:"50U",data:cu50,borderColor:"transparent",backgroundColor:m.color+"44",fill:"+1",pointRadius:0,spanGaps:false,tension:0.4},
      {label:"50L",data:cl50,borderColor:"transparent",backgroundColor:m.color+"44",fill:false,pointRadius:0,spanGaps:false,tension:0.4},
      {label:"Historical",data:hD,borderColor:m.color,borderWidth:2,pointRadius:0,spanGaps:false,tension:0.3,fill:false},
      {label:"AI Forecast",data:fD,borderColor:"#4CAF50",borderWidth:2,borderDash:[6,3],pointRadius:0,spanGaps:false,tension:0.3,fill:false},
      {label:"Live",data:liveP,borderColor:"#00C9A7",backgroundColor:"#00C9A7",pointRadius:8,showLine:false,spanGaps:false}
    ]},
    options:{
      responsive:true,animation:{duration:400},
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{enabled:false}   // we use our custom tooltip
      },
      scales:{
        x:{ticks:{color:"#888",font:{size:9},maxTicksLimit:10},grid:{color:"#1C203055"}},
        y:{ticks:{color:"#888",font:{size:9},callback:v=>fmtINR(v)},grid:{color:"#1C203055"}}
      },
      onHover:(event,elements,chart)=>{
        const canvasRect = ctx.getBoundingClientRect();
        const tooltip = document.getElementById("crosshair-tooltip");
        if(!event.native||!tooltip) return;

        const points = chart.getElementsAtEventForMode(event.native,"index",{intersect:false},false);
        if(!points.length){ tooltip.style.display="none"; chart._crosshairX=undefined; chart.update("none"); return; }

        const idx = points[0].index;
        const x   = points[0].element.x;
        const label = chart.data.labels[idx];

        // Find active price
        const histVal = chart.data.datasets[4].data[idx];
        const fcVal   = chart.data.datasets[5].data[idx];
        const cu90Val = chart.data.datasets[0].data[idx];
        const cl90Val = chart.data.datasets[1].data[idx];
        const price   = histVal||fcVal;

        if(!price){ tooltip.style.display="none"; return; }

        // Crosshair
        const yScale = chart.scales.y;
        chart._crosshairX = x;
        chart._crosshairY = yScale.getPixelForValue(price);
        chart.update("none");

        // Tooltip content
        const isFC = fcVal && !histVal;
        tooltip.innerHTML = `
          <div style="font-size:9px;color:#888;letter-spacing:0.1em;margin-bottom:6px">${label}</div>
          <div style="font-size:14px;font-weight:700;color:${isFC?"#4CAF50":m.color}">${fmtINRFull(price)}</div>

            90% CI: ${fmtINR(cl90Val)} – ${fmtINR(cu90Val)}
          </div>`:""}`;

        // Position tooltip
        const chartX = event.native.offsetX;
        const chartY = event.native.offsetY;
        const tW = 180;
        const left = chartX + tW + 20 > canvasRect.width ? chartX - tW - 10 : chartX + 15;
        tooltip.style.display="block";
        tooltip.style.left=left+"px";
        tooltip.style.top=(chartY-20)+"px";
      }
    }
  });

  // Mouse leave
  ctx.addEventListener("mouseleave",()=>{
    const t=document.getElementById("crosshair-tooltip");
    if(t) t.style.display="none";
    if(chartInstance){ chartInstance._crosshairX=undefined; chartInstance.update("none"); }
  });

  render4Panel();
}

// IBJA unit sizes — exactly matching India Market tab
// Gold/Platinum: priced per 10g on IBJA
// Silver/Copper:  priced per kg on IBJA
const PF_IBJA_UNIT_G = { Gold:10, Silver:1000, Copper:1000, Platinum:10 };
const PF_IBJA_UNIT_LABEL = { Gold:"10g", Silver:"1kg", Copper:"1kg", Platinum:"10g" };

function pfIBJAPrice(metal){
  // IBJA always from yahoo_inr (official morning rate) — live price fluctuates but IBJA is fixed daily
  const m = METALS[metal];
  return m.yahoo_inr * (IBJA_MULT[metal] || 1.0784);
}

function pfCurrentPricePerGram(metal){
  // IBJA price → per gram
  return pfIBJAPrice(metal) / PF_IBJA_UNIT_G[metal];
}

// Purity map — fraction of pure metal
const PF_PURITY = {
  "24K / 999 (Pure)":    0.999,
  "23K / 958 (Britannia)": 0.958,
  "22K / 916 (Hallmark)":  0.916,
  "21K / 875":             0.875,
  "18K / 750":             0.750,
  "14K / 585":             0.585,
  "10K / 417":             0.417,
  "999 (Pure Silver)":     0.999,
  "925 (Sterling)":        0.925,
  "800 (European)":        0.800,
  "999 (Pure Copper)":     0.999,
  "999 (Pure Platinum)":   0.999,
  "950 Platinum":          0.950,
  "900 Platinum":          0.900,
};

const PF_PURITY_BY_METAL = {
  Gold:     ["24K / 999 (Pure)", "23K / 958 (Britannia)", "22K / 916 (Hallmark)", "21K / 875", "18K / 750", "14K / 585", "10K / 417"],
  Silver:   ["999 (Pure Silver)", "925 (Sterling)", "800 (European)"],
  Copper:   ["999 (Pure Copper)"],
  Platinum: ["999 (Pure Platinum)", "950 Platinum", "900 Platinum"],
};

function pfPurityFactor(h){
  return PF_PURITY[h.purity] ?? 1.0;
}

function pfCalcHolding(h){
  // h.qty      = gross grams (total weight including alloy)
  // h.buyPrice = ₹ per IBJA unit (stored per-gram after conversion)
  // purity     = fraction of pure metal (e.g. 22K = 0.916)
  const purity       = pfPurityFactor(h);
  const pureGrams    = h.qty * purity;          // effective pure gold/silver grams
  const pricePerGram = pfCurrentPricePerGram(h.metal); // IBJA per pure gram (24K basis)
  const currentVal   = pureGrams * pricePerGram;
  const investedVal  = h.qty * h.buyPrice;      // what you actually paid (gross weight × price)
  const pnl          = currentVal - investedVal;
  const pnlPct       = investedVal ? ((currentVal - investedVal) / investedVal) * 100 : 0;
  const m            = METALS[h.metal];
  const todayChg     = currentVal * (m.change_1d / 100);
  const ibjaUnit     = PF_IBJA_UNIT_G[h.metal];
  return {currentVal, investedVal, pnl, pnlPct, todayChg,
          pureGrams, purity,
          currentPricePerGram: pricePerGram,
          currentIBJA: pricePerGram * ibjaUnit,
          buyIBJA: h.buyPrice * ibjaUnit};
}

function pfSharpeRatio(){
  // Sharpe Ratio = (Rp - Rf) / σp
  // All values computed over the SAME holding period — no misleading annualisation
  if(portfolio.length === 0) return null;

  const RF_ANNUAL = 0.071; // India 10Y G-Sec ~7.1%

  // Step 1: Actual holding period in days from earliest purchase
  let holdingDays = 30;
  try {
    const dates = portfolio.map(h=>new Date(h.buyDate)).filter(d=>!isNaN(d));
    if(dates.length > 0){
      const earliest = Math.min(...dates.map(d=>d.getTime()));
      holdingDays = Math.max(7, Math.round((Date.now() - earliest) / 86400000));
    }
  } catch(e){}

  // Step 2: Actual total portfolio return (Rp) — what the user actually earned
  const tots = pfTotals();
  const Rp = tots.pnlPct / 100; // e.g. +1.7285 for +172.85%

  // Step 3: Risk-free return for same holding period (not annualised)
  const Rf_period = RF_ANNUAL * (holdingDays / 365);

  // Step 4: Volatility (σp) from last 30 hist days of daily returns
  const vals = [];
  for(let i=30; i>=0; i--){
    let val = 0;
    portfolio.forEach(h=>{
      const m = METALS[h.metal];
      const histIdx = Math.max(0, m.hist.length - 1 - i);
      const unitPrice = m.hist[histIdx];
      const perGram = (unitPrice * (IBJA_MULT[h.metal] || 1.0784)) / PF_IBJA_UNIT_G[h.metal];
      val += h.qty * pfPurityFactor(h) * perGram;
    });
    vals.push(val);
  }
  const dailyReturns = [];
  for(let i=1; i<vals.length; i++){
    if(vals[i-1] > 0) dailyReturns.push((vals[i]-vals[i-1])/vals[i-1]);
  }
  if(dailyReturns.length < 2) return null;

  const meanDaily = dailyReturns.reduce((a,b)=>a+b,0) / dailyReturns.length;
  const variance  = dailyReturns.reduce((a,b)=>a+Math.pow(b-meanDaily,2),0) / (dailyReturns.length-1);
  const stdDaily  = Math.sqrt(variance);

  // Scale daily vol to holding period
  const sigma_period = stdDaily * Math.sqrt(holdingDays);

  if(sigma_period === 0) return null;

  // Step 5: Sharpe over holding period
  const sharpe = (Rp - Rf_period) / sigma_period;

  return {
    sharpe,
    annualisedReturn: tots.pnlPct,      // actual total P&L %
    holdingDays,
    stdDev: stdDaily * Math.sqrt(252) * 100,  // annualised vol % for display
    rfRate: RF_ANNUAL * 100,
    Rf_period: Rf_period * 100          // risk-free for the period
  };
}

function pfTotals(){
  let totalInvested=0, totalCurrent=0, totalPnl=0, todayChg=0;
  portfolio.forEach(h=>{
    const c = pfCalcHolding(h);
    totalInvested += c.investedVal;
    totalCurrent  += c.currentVal;
    totalPnl      += c.pnl;
    todayChg      += c.todayChg;
  });
  const pnlPct = totalInvested ? ((totalCurrent-totalInvested)/totalInvested)*100 : 0;
  const todayPct = totalCurrent ? (todayChg/totalCurrent)*100 : 0;
  return {totalInvested, totalCurrent, totalPnl, pnlPct, todayChg, todayPct};
}

function pfForecastValues(){
  const days = 30;
  const result = [];
  for(let i=0;i<days;i++){
    let val = 0;
    portfolio.forEach(h=>{
      const m = METALS[h.metal];
      const unitForecast = m.future[Math.min(i, m.future.length-1)];
      const ibjaForecast = unitForecast * (IBJA_MULT[metal] || 1.0784);
      const perGram      = ibjaForecast / PF_IBJA_UNIT_G[h.metal];
      const purity       = pfPurityFactor(h);
      val += h.qty * purity * perGram;   // pure grams × forecast per gram
    });
    result.push(val);
  }
  return result;
}

                });
                return v;
              });
              return `<tr style="border-bottom:1px solid #1C2030;${i===0?"background:#4CAF5008":""}">

    </div>
    `}
  </div>`;
}

function pfUpdatePreview(){
  const metalEl  = document.getElementById("pf-metal");
  const qtyEl    = document.getElementById("pf-qty");
  const priceEl  = document.getElementById("pf-price");
  const purityEl = document.getElementById("pf-purity");
  const hint     = document.getElementById("pf-price-hint");
  const preview  = document.getElementById("pf-preview");
  const qtyHint  = document.getElementById("pf-qty-hint");
  const purityHint = document.getElementById("pf-purity-hint");

  if(!metalEl) return;
  const metal = metalEl.value;
  const ibjaUnit       = PF_IBJA_UNIT_G[metal];
  const ibjaLabel      = PF_IBJA_UNIT_LABEL[metal];
  const currentIBJA    = pfIBJAPrice(metal);
  const currentPerGram = currentIBJA / ibjaUnit;

  // Rebuild purity dropdown if metal changed
  if(purityEl){
    const opts = PF_PURITY_BY_METAL[metal] || ["999"];
    const curVal = purityEl.value;
    const stillValid = opts.includes(curVal);
    purityEl.innerHTML = opts.map(p=>`<option value="${p}"${p===curVal&&stillValid?" selected":""}>${p}</option>`).join('');
    const hints = {
      Gold:"22K / 916 most common for jewellery · 24K for coins & bars",
      Silver:"925 Sterling most common · 999 for bars/coins",
      Copper:"Usually 999 pure",
      Platinum:"950 most common for jewellery"
    };
    if(purityHint) purityHint.textContent = hints[metal]||"";
  }

  // Purity factor
  const purityKey  = purityEl?.value || PF_PURITY_BY_METAL[metal]?.[0] || "999";
  const purityFact = PF_PURITY[purityKey] ?? 1.0;

  // Labels
  const label = document.getElementById("pf-price-mode-label");
  if(label) label.textContent = pfInputMode==="total" ? "(₹ total paid)" : `(₹ per ${ibjaLabel} — IBJA)`;
  if(hint)  hint.textContent  = `IBJA now: ${fmtINR(currentIBJA)} per ${ibjaLabel} (24K basis)`;
  if(qtyHint){
    const ex = {Gold:"gross weight — e.g. 10g bangle=10, 8g coin=8", Silver:"e.g. 100g=100, 1kg=1000", Copper:"e.g. 500g=500", Platinum:"e.g. 5g=5, 10g=10"};
    qtyHint.textContent = ex[metal]||"gross weight in grams";
  }

  const qty      = parseFloat(qtyEl?.value);
  const priceRaw = parseFloat(priceEl?.value);
  if(!qty||!priceRaw||qty<=0||priceRaw<=0){ if(preview) preview.style.display="none"; return; }

  let buyPricePerGram = pfInputMode==="total" ? (priceRaw/qty) : (priceRaw/ibjaUnit);
  const pureGrams = qty * purityFact;
  const invested  = qty * buyPricePerGram;
  const current   = pureGrams * currentPerGram;
  const pnl       = current - invested;
  const pnlPct    = invested ? (pnl/invested)*100 : 0;

  if(preview){
    preview.style.display="block";
    document.getElementById("prev-qty").textContent     = qty + "g (gross)";
    document.getElementById("prev-purity").textContent  = `${purityKey.split(" ")[0]} = ${(purityFact*100).toFixed(1)}%`;
    document.getElementById("prev-pure").textContent    = pureGrams.toFixed(3) + "g pure";
    document.getElementById("prev-invested").textContent = fmtINRFull(invested);
    document.getElementById("prev-current").textContent  = fmtINRFull(current);
    document.getElementById("prev-current").style.color  = pnl>=0?"#4CAF50":"#FF6666";
    document.getElementById("prev-pnl").textContent = (pnl>=0?"+":"")+fmtINRFull(pnl)+"  ("+(pnlPct>=0?"▲":"▼")+Math.abs(pnlPct).toFixed(2)+"%)";
    document.getElementById("prev-pnl").style.color = pnl>=0?"#4CAF50":"#FF6666";
  }
}

// ============================================================
// AUTO-CALCULATION ENGINE
// Computes RSI, MACD, Bollinger, change_1d, XAI — all from live prices
// No manual updates needed — everything derives from liveData[]
// ============================================================

// ── Technical Indicator Calculators ──────────────────────────

function calcRSI(prices, period=14){
  if(prices.length < period+1) return 50;
  let gains=0, losses=0;
  for(let i=prices.length-period; i<prices.length; i++){
    const d = prices[i]-prices[i-1];
    if(d>0) gains+=d; else losses+=Math.abs(d);
  }
  const rs = gains/losses||0;
  return losses===0 ? 100 : 100 - (100/(1+rs));
}

function calcMACD(prices){
  const ema = (p,n) => {
    const k=2/(n+1); let e=p[0];
    for(let i=1;i<p.length;i++) e=p[i]*k+e*(1-k);
    return e;
  };
  if(prices.length<26) return {macd:0,signal:0,hist:0};
  const e12=ema(prices.slice(-12),12), e26=ema(prices.slice(-26),26);
  const macd=e12-e26;
  const sig=ema([...prices.slice(-9).map((_,i)=>ema(prices.slice(0,prices.length-9+i+1).slice(-12),12)-ema(prices.slice(0,prices.length-9+i+1).slice(-26),26)),macd],9);
  return {macd, signal:sig, hist:macd-sig};
}

function calcBollinger(prices, period=20){
  if(prices.length<period) return {upper:prices.at(-1),lower:prices.at(-1),pct:0.5};
  const slice=prices.slice(-period);
  const mean=slice.reduce((a,b)=>a+b,0)/period;
  const std=Math.sqrt(slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/period);
  const upper=mean+2*std, lower=mean-2*std;
  const pct = std===0 ? 0.5 : (prices.at(-1)-lower)/(upper-lower);
  return {upper,lower,pct,mean,std};
}

function calcMA(prices, period){
  if(prices.length<period) return prices.at(-1);
  return prices.slice(-period).reduce((a,b)=>a+b,0)/period;
}

// ── Day-over-day change tracking via localStorage ─────────────
function saveTodayPrices(){
  try{
    const today = new Date().toISOString().slice(0,10);
    const stored = JSON.parse(localStorage.getItem("mo_prices")||"{}");
    // Clean up any corrupt entries (prices should be within realistic ranges)
    const RANGES = {Gold:[50000,500000], Silver:[50000,1000000], Copper:[500,5000], Platinum:[20000,200000]};
    Object.keys(stored).forEach(day=>{
      metalKeys.forEach(k=>{
        const p = stored[day]?.[k];
        const r = RANGES[k];
        if(p && r && (p < r[0] || p > r[1])){
          console.warn('Removing corrupt price from localStorage:', k, p);
          delete stored[day][k];
        }
      });
    });
    if(!stored[today]) stored[today] = {};
    metalKeys.forEach(k=>{
      if(liveData[k]){
        const r = RANGES[k];
        if(liveData[k] >= r[0] && liveData[k] <= r[1])
          stored[today][k] = liveData[k];
      }
    });
    // Keep only last 3 days
    const days = Object.keys(stored).sort();
    if(days.length > 3) delete stored[days[0]];
    localStorage.setItem("mo_prices", JSON.stringify(stored));
  }catch(e){}
}

function getYesterdayPrice(metal){
  try{
    const stored = JSON.parse(localStorage.getItem("mo_prices")||"{}");
    const days = Object.keys(stored).sort();
    const today = new Date().toISOString().slice(0,10);
    // Find most recent day that isn't today
    for(let i=days.length-1;i>=0;i--){
      if(days[i]!==today && stored[days[i]][metal]) return stored[days[i]][metal];
    }
  }catch(e){}
  return null;
}

// ── Scale forecast array from live price ──────────────────────
function scaledForecast(metal){
  const m = METALS[metal];
  const live = liveData[metal] || m.yahoo_inr;
  const scale = live / m.yahoo_inr;
  return m.future.map(p => Math.round(p * scale));
}

// ── Compute live change_1d from stored prices ──────────────────
function liveChange1d(metal){
  const live = liveData[metal] || METALS[metal].yahoo_inr;
  const yest = getYesterdayPrice(metal);
  if(yest && yest > 0){
    const chg = ((live - yest) / yest) * 100;
    // Sanity check — real metals never move more than 15% in a day
    if(Math.abs(chg) > 15) return METALS[metal].change_1d; // fallback to hardcoded
    return chg;
  }
  return METALS[metal].change_1d; // fallback to hardcoded
}

// ── Master XAI computer — derives everything from live price + hist ──
function computeXAI(metal){
  const m    = METALS[metal];
  const live = liveData[metal] || m.yahoo_inr;

  // Build full price series: hist + live
  const prices = [...m.hist, live];

  // Calculate all indicators
  const rsi   = calcRSI(prices);
  const macd  = calcMACD(prices);
  const boll  = calcBollinger(prices);
  const ma7   = calcMA(prices, 7);
  const ma30  = calcMA(prices, 30);
  const chg1d = liveChange1d(metal);

  // Use real attention weights — normalise to sum=1
  const rawAtt = REAL_ATTENTION[metal];
  const attSum2 = rawAtt.reduce((a,b)=>a+b,0);
  const attNorm = rawAtt.map(v=>parseFloat((v/attSum2).toFixed(4)));

  // Derive driver effects from indicators
  const ma30Div   = ((live - ma30) / ma30) * 100;
  const ma7Div    = ((live - ma7)  / ma7)  * 100;
  const rsiEffect = rsi < 30 ? +(((30-rsi)/30)*0.35).toFixed(2)
                  : rsi > 70 ? -(((rsi-70)/30)*0.35).toFixed(2) : 0;
  const macdEff   = parseFloat((macd.hist / live * 100 * 15).toFixed(2));
  const bollEff   = parseFloat(((0.5 - boll.pct) * 0.4).toFixed(2));
  const ma30Eff   = parseFloat((ma30Div * 0.12).toFixed(2));
  const ma7Eff    = parseFloat((ma7Div  * 0.08).toFixed(2));

  // Cross-metal correlation effect — capped to realistic range
  const peers = metalKeys.filter(k=>k!==metal);
  const peerChgs = peers.map(k=>liveChange1d(k)).filter(v=>Math.abs(v)<15);
  const peerEff = peerChgs.length > 0
    ? parseFloat((peerChgs.reduce((s,v)=>s+v,0) / peerChgs.length * 0.15).toFixed(2))
    : 0;

  // Direction and summary
  const direction = chg1d >= 0 ? 1 : -1;
  const absChg = Math.abs(chg1d);
  const intensity = absChg>3?"Strong":absChg>1.5?"Moderate":"Mild";
  const dir = chg1d>=0?"upward":"downward";

  // Build driver list sorted by absolute effect
  const drivers = [
    {feature:"30-Day MA Divergence",   effect:ma30Eff, direction:ma30Eff>=0?1:-1,
     detail:`Price ${Math.abs(ma30Div).toFixed(1)}% ${ma30Div>=0?"above":"below"} MA30 — ${ma30Div>=0?"bullish":"bearish"} medium-term trend`},
    {feature:"MACD Signal",            effect:macdEff, direction:macdEff>=0?1:-1,
     detail:`MACD histogram ${macd.hist>=0?"positive":"negative"} (${macd.hist.toFixed(1)}) — momentum ${macd.hist>=0?"building":"fading"}`},
    {feature:"RSI-14",                 effect:rsiEffect, direction:rsiEffect>=0?1:-1,
     detail:`RSI at ${rsi.toFixed(1)} — ${rsi<30?"oversold (bounce risk)":rsi>70?"overbought (pullback risk)":"neutral range"}`},
    {feature:"Bollinger %B",           effect:bollEff, direction:bollEff>=0?1:-1,
     detail:`Price at ${(boll.pct*100).toFixed(0)}% of band — ${boll.pct<0.2?"near lower (oversold)":boll.pct>0.8?"near upper (overbought)":"mid-band"}`},
    {feature:"7-Day MA Signal",        effect:ma7Eff, direction:ma7Eff>=0?1:-1,
     detail:`Short-term MA ${ma7Div>=0?"above":"below"} price by ${Math.abs(ma7Div).toFixed(1)}% — ${ma7Div>=0?"support":"resistance"}`},
    {feature:"Peer Metal Correlation", effect:peerEff, direction:peerEff>=0?1:-1,
     detail:`Avg peer metals ${peerEff>=0?"up":"down"} ${Math.abs(peerEff*6.7).toFixed(1)}% — ${peerEff>=0?"supportive":"adding pressure"}`},
  ].sort((a,b)=>Math.abs(b.effect)-Math.abs(a.effect));

  const net = drivers.reduce((s,d)=>s+d.effect,0);

  // Build summary from dominant driver
  const topDriver = drivers[0];
  const summaryMap = {
    "30-Day MA Divergence": ma30Div<0 ? "MA30 breakdown" : "MA30 breakout",
    "MACD Signal":          macd.hist<0 ? "MACD bearish momentum" : "MACD bullish momentum",
    "RSI-14":               rsi<30 ? "oversold RSI" : rsi>70 ? "overbought RSI" : "neutral RSI",
  };
  const topName = summaryMap[topDriver.feature] || topDriver.feature.toLowerCase();
  const summary = `${intensity} ${dir} signal — ${topName} is the primary driver. Net predicted effect: ${net>=0?"+":""}${net.toFixed(2)}%`;

  return {
    prediction: `${chg1d>=0?"▲":"▼"} ${chg1d>=0?"+":""}${chg1d.toFixed(2)}%`,
    direction,
    summary,
    drivers,
    attention: attNorm,
    rsi, macd, boll, ma7, ma30, chg1d
  };
}

const IBJA_MULT = { Gold:1.0784, Silver:1.1975, Platinum:1.034, Copper:1.087 };

function calcIBJA(spotINR, metal){
  return spotINR * (IBJA_MULT[metal] || 1.0784);
}

function calcGoldPurity(ibja999Per10g, carat){
  // goodreturns.in verified formula: use carat/24 (not fineness/999)
  // 22K: 22/24 = 0.9166... → ₹1,46,350/10g ✓
  // 18K: 18/24 = 0.7500  → ₹1,19,740/10g ✓
  return ibja999Per10g * (carat / 24);
}

    if(!el) return;
    el.innerHTML = `<iframe src="${src}"
      style="width:100%;height:${height}px;border:none;"
      allowtransparency="true" scrolling="no" allowfullscreen
      loading="lazy"></iframe>`;
  }

  const enc = encodeURIComponent(sym);

    interval: tf, width:"100%", height:420,
    symbol: sym, showIntervalTabs:true,
    locale:"en", colorTheme:"dark", isTransparent:true
  }));
  tvIframe("tv-technical-summary",
    `https://www.tradingview.com/embed-widget/technical-analysis/?locale=en#${cfg1}`,
    420);

  // 2 ── ADVANCED LIVE CHART
  const cfg2 = encodeURIComponent(JSON.stringify({
    symbol: sym, interval: tf,
    timezone:"Asia/Kolkata", theme:"dark",
    style:"1", locale:"en", height:420, width:"100%",
    withdateranges:true, hide_side_toolbar:false,
    allow_symbol_change:true, calendar:false,

// Clear corrupt localStorage prices from previous buggy versions
try{
  const stored = JSON.parse(localStorage.getItem("mo_prices")||"{}");
  const RANGES = {Gold:[50000,500000],Silver:[50000,1000000],Copper:[500,5000],Platinum:[20000,200000]};
  let dirty = false;
  Object.keys(stored).forEach(day=>{
    metalKeys.forEach(k=>{
      const p = stored[day]?.[k];
      if(p && RANGES[k] && (p<RANGES[k][0]||p>RANGES[k][1])){
        delete stored[day][k]; dirty=true;
        console.log('Cleared corrupt price:', k, p);
      }
    });
  });
  if(dirty) localStorage.setItem("mo_prices", JSON.stringify(stored));
}catch(e){}
fetchLiveData();
setInterval(updateClock, 1000);
// Init counter display from saved usage
try{
  const today=new Date().toISOString().slice(0,7);
  const usage=JSON.parse(localStorage.getItem("api_usage")||"{}");
  updateApiCounter(usage[today]||0);
}catch(e){}
